name: Test Windows Installer

on:
  push:
    branches: [master, main, 'feat/*']
    paths:
      - 'install.ps1'
      - 'start.ps1'
      - 'stop.ps1'
      - 'scripts/windows/install-helpers.psm1'
      - 'tests/windows/**'
      - '.github/workflows/test-installer.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'install.ps1'
      - 'start.ps1'
      - 'stop.ps1'
      - 'scripts/windows/install-helpers.psm1'
      - 'tests/windows/**'
      - '.github/workflows/test-installer.yml'

jobs:
  test-scripts:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify script syntax
        shell: powershell
        run: |
          $scripts = @('install.ps1', 'start.ps1', 'stop.ps1')
          $allValid = $true

          Write-Host "Verifying PowerShell script syntax..." -ForegroundColor Cyan

          foreach ($script in $scripts) {
            Write-Host "  Checking $script..." -NoNewline
            try {
              $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $script -Raw), [ref]$null)
              Write-Host " OK" -ForegroundColor Green
            }
            catch {
              Write-Host " FAILED" -ForegroundColor Red
              Write-Error "Syntax error in $script : $_"
              $allValid = $false
            }
          }

          if (-not $allValid) {
            exit 1
          }

          Write-Host "All scripts passed syntax check" -ForegroundColor Green

  pester-install-helpers:
    runs-on: windows-latest
    needs: test-scripts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester and run install helper tests
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -MaximumVersion 5.99.99 -Force -Scope CurrentUser -SkipPublisherCheck
          Invoke-Pester -Path ./tests/windows/install-helpers.Tests.ps1 -CI

  test-with-docker:
    runs-on: windows-latest
    needs: test-scripts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Docker service
        shell: powershell
        run: |
          # Wait for Docker to be ready
          $maxAttempts = 30
          $attempt = 0

          Write-Host "Waiting for Docker to start..."
          while ($attempt -lt $maxAttempts) {
            try {
              $result = docker version --format '{{.Server.Version}}' 2>$null
              if ($result) {
                Write-Host "Docker is ready: $result" -ForegroundColor Green
                break
              }
            }
            catch {}

            $attempt++
            Start-Sleep -Seconds 5
          }

          if ($attempt -eq $maxAttempts) {
            Write-Error "Docker failed to start"
            exit 1
          }

      - name: Test install script with mock inputs
        shell: powershell
        run: |
          # Create mock .env file for testing
          $envLines = @(
            "LLM_PROVIDER=openai",
            "LLM_API_KEY=test-key-for-ci",
            "LLM_MODEL=gpt-4-turbo-preview",
            "LLM_BASE_URL=https://api.openai.com/v1"
          )
          $envContent = $envLines -join "`r`n"
          Set-Content -Path ".env" -Value $envContent -NoNewline

          Write-Host "Testing docker compose configuration..." -ForegroundColor Cyan

          # Validate docker-compose.yml syntax
          docker compose config --quiet

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Docker compose configuration is valid" -ForegroundColor Green
          }
          else {
            Write-Error "Docker compose configuration is invalid"
            exit 1
          }
