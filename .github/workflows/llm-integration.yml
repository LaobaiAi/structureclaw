name: LLM Integration Tests

on:
  workflow_dispatch:
    inputs:
      llm_model:
        description: "LLM model name (leave empty for default)"
        required: false
        default: ""
      filter:
        description: "Test category filter (routing|extraction|pipeline|clarification)"
        required: false
        default: ""
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/actions/setup-env/**'
      - '.github/workflows/llm-integration.yml'
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/actions/setup-env/**'
      - '.github/workflows/llm-integration.yml'

jobs:
  llm-integration:
    environment: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run LLM integration tests
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ github.event.inputs.llm_model }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_LOG_ENABLED: "true"
          DATABASE_URL: "file:.runtime/data/structureclaw-llm-ci.db"
        run: node tests/runner.mjs llm-integration ${{ github.event.inputs.filter && format('--filter {0}', github.event.inputs.filter) || '' }}

      - name: Upload LLM call logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-logs-${{ matrix.os }}
          path: .runtime/logs/llm-calls.jsonl
          retention-days: 7
          if-no-files-found: ignore
