name: Core Regression

on:
  pull_request:
    paths:
      - 'core/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/core-regression.yml'
  push:
    branches:
      - master
    paths:
      - 'core/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/core-regression.yml'

jobs:
  core-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare Core Virtualenv
        run: |
          python -m venv core/.venv
          core/.venv/bin/pip install --upgrade pip
          core/.venv/bin/pip install -r core/requirements.txt

      - name: Run Core Regression
        run: make core-regression
