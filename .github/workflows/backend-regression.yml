name: Backend Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.env.example'
      - '.github/actions/setup-env/**'
      - '.github/workflows/backend-regression.yml'
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.env.example'
      - '.github/actions/setup-env/**'
      - '.github/workflows/backend-regression.yml'

jobs:
  backend-regression:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run Backend Regression
        run: node tests/runner.mjs backend-regression
