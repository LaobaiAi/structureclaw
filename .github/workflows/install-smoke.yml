name: Install smoke

on:
  push:
    branches: [master, main, 'feat/*']
    paths:
      - 'docker-compose.yml'
      - 'docker/**'
      - 'Makefile'
      - 'make.ps1'
      - '.env.example'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/ci/**'
      - '.github/workflows/install-smoke.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'docker-compose.yml'
      - 'docker/**'
      - 'Makefile'
      - 'make.ps1'
      - '.env.example'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/ci/**'
      - '.github/workflows/install-smoke.yml'

jobs:
  native-install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Native install smoke (npm ci + build)
        shell: bash
        run: bash scripts/ci/native-install-smoke.sh

  docker-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker compose smoke
        shell: bash
        run: bash scripts/ci/docker-compose-smoke.sh

  docker-compose-smoke-windows:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker is ready
        shell: cmd
        run: |
          "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ".\scripts\ci\verify-docker-ready.ps1"

      - name: Docker compose smoke
        shell: cmd
        run: |
          "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ".\scripts\ci\docker-compose-smoke.ps1"
