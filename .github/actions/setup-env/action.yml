name: "Setup Environment"
description: "Install Node.js via project scripts, then run sclaw doctor + build"

runs:
  using: "composite"
  steps:
    - name: Install Node.js (Linux)
      if: runner.os != 'Windows'
      shell: bash
      run: bash scripts/install-node-linux.sh

    - name: Install Node.js (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $scriptContent = [System.IO.File]::ReadAllText("$env:GITHUB_WORKSPACE\scripts\install-node-windows.ps1", [System.Text.Encoding]::UTF8)
        Invoke-Expression $scriptContent

    - name: Setup via sclaw (Linux)
      if: runner.os != 'Windows'
      shell: bash
      run: node ./sclaw doctor

    - name: Setup via sclaw (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: node ./sclaw doctor

    - name: Build via sclaw (Linux)
      if: runner.os != 'Windows'
      shell: bash
      run: node ./sclaw build

    - name: Build via sclaw (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: node ./sclaw build
